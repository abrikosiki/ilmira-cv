<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karakuli — Диаграмма Ганта</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --border: #E4E2DA;
  --text: #1A1916;
  --muted: #9A9890;
  --artem: #3A7BF7;
  --artem-light: #EBF1FF;
  --ilmira: #0FA874;
  --ilmira-light: #E6F8F2;
  --igor: #D14F8A;
  --igor-light: #FAEDF4;
  --none: #B0AD9E;
  --none-light: #F2F1EC;
  --today: #FF5C2B;
  --row-h: 44px;
  --label-w: 230px;
  --who-w: 90px;
}

body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 40px 32px;
}

header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 12px;
}

.logo {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.logo-name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
}

.logo-sub {
  font-size: 13px;
  color: var(--muted);
  font-weight: 500;
}

.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.2px;
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
}

.gantt-wrap {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.gantt-header {
  display: flex;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 10;
}

.col-label {
  min-width: var(--label-w);
  width: var(--label-w);
  padding: 12px 20px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}

.col-who {
  min-width: var(--who-w);
  width: var(--who-w);
  padding: 12px 12px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}

.timeline-header {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.day-col {
  flex: 1;
  min-width: 0;
  text-align: center;
  padding: 8px 0;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 1px;
  align-items: center;
}

.day-col:last-child { border-right: none; }
.day-col .day-num { font-size: 14px; font-weight: 700; color: var(--text); }
.day-col.today-col .day-num { color: var(--today); }
.day-col.today-col { background: #FFF5F2; }

.task-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  align-items: center;
  min-height: var(--row-h);
  transition: background 0.1s;
}

.task-row:last-child { border-bottom: none; }
.task-row:hover { background: #FAFAF8; }

.task-label {
  min-width: var(--label-w);
  width: var(--label-w);
  padding: 0 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  line-height: 1.35;
}

.task-who {
  min-width: var(--who-w);
  width: var(--who-w);
  padding: 0 12px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}

.who-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 5px;
  letter-spacing: 0.2px;
  white-space: nowrap;
}

.timeline-row {
  flex: 1;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.day-slot {
  flex: 1;
  min-width: 0;
  height: var(--row-h);
  border-right: 1px solid var(--border);
  position: relative;
}

.day-slot:last-child { border-right: none; }
.day-slot.today-slot { background: #FFF5F2; }

.bar-container {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  padding: 0 3px;
  pointer-events: none;
}

.bar {
  height: 20px;
  border-radius: 5px;
  width: 100%;
}

.today-line {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--today);
  opacity: 0.6;
  z-index: 5;
  pointer-events: none;
}

.deadline-dot {
  position: absolute;
  right: 2px;
  top: 50%;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: white;
  border: 2px solid rgba(0,0,0,0.25);
  z-index: 6;
  pointer-events: none;
}

.summary-row {
  display: flex;
  gap: 24px;
  padding: 20px 20px;
  border-top: 1px solid var(--border);
  background: #FAFAF8;
  flex-wrap: wrap;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-num {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

.stat-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

footer {
  margin-top: 20px;
  font-size: 12px;
  color: var(--muted);
  text-align: center;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-name">Karakuli — план спринта</div>
    <div class="logo-sub">19–26 мая 2026</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--artem)"></div>Артём</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--ilmira)"></div>Ильмира</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--igor)"></div>Игорь</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--none)"></div>Не назначено</div>
  </div>
</header>

<div class="gantt-wrap">
  <div class="gantt-header">
    <div class="col-label">Задача</div>
    <div class="col-who">Кто</div>
    <div class="timeline-header" id="timelineHeader"></div>
  </div>
  <div id="ganttBody"></div>
  <div class="summary-row" id="summaryRow"></div>
</div>

<footer>Karakuli Math School · Sprint May 2026</footer>

<script>
const START = new Date('2026-05-19');
const END   = new Date('2026-05-26');

function daysRange(s, e) {
  const days = [];
  let cur = new Date(s);
  while (cur <= e) { days.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  return days;
}

const DAYS = daysRange(START, END);
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

const MONTHS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const DAYS_RU = ['вс','пн','вт','ср','чт','пт','сб'];

const WHO_STYLES = {
  'Артём':    { bg: 'var(--artem)',  light: 'var(--artem-light)',  text: '#fff' },
  'Ильмира':  { bg: 'var(--ilmira)', light: 'var(--ilmira-light)', text: '#fff' },
  'Игорь':    { bg: 'var(--igor)',   light: 'var(--igor-light)',   text: '#fff' },
  '':         { bg: 'var(--none)',   light: 'var(--none-light)',   text: '#fff' },
};

const tasks = [
  { name: 'Аудит сайта',                          start: '2026-05-19', end: '2026-05-20', who: 'Артём' },
  { name: 'Сформулировать сообщение блогерам',    start: '2026-05-19', end: '2026-05-21', who: 'Артём' },
  { name: 'Поговорить с сейлзом Ваней',           start: '2026-05-19', end: '2026-05-21', who: 'Артём' },
  { name: 'Белый WhatsApp — изучить',             start: '2026-05-19', end: '2026-05-21', who: 'Ильмира' },
  { name: 'Ждём список блогеров',                 start: '2026-05-19', end: '2026-05-22', who: 'Игорь' },
  { name: 'Написать блогерам',                    start: '2026-05-19', end: '2026-05-23', who: 'Ильмира' },
  { name: 'Подготовить сайт к лидам',             start: '2026-05-19', end: '2026-05-22', who: 'Ильмира' },
  { name: 'План Б если WhatsApp блочат',          start: '2026-05-19', end: '2026-05-22', who: '' },
  { name: 'Написать Антонии/Кате по тьюторам',   start: '2026-05-19', end: '2026-05-24', who: 'Артём' },
  { name: 'Страйп — сделать',                     start: '2026-05-19', end: '2026-05-24', who: 'Артём' },
  { name: 'Поговорить с мамой Ванессой',          start: '2026-05-19', end: '2026-05-24', who: 'Артём' },
  { name: 'Текст для креативов (таргет)',         start: '2026-05-19', end: '2026-05-25', who: 'Артём' },
  { name: 'Узнать слоты тьюторов → сайт',        start: '2026-05-19', end: '2026-05-25', who: 'Ильмира' },
  { name: 'Оплатить Zoom аккаунт',               start: '2026-05-19', end: '2026-05-25', who: 'Ильмира' },
  { name: 'Создать креативы',                     start: '2026-05-19', end: '2026-05-26', who: 'Ильмира' },
  { name: 'Запустить таргет',                     start: '2026-05-19', end: '2026-05-26', who: 'Ильмира' },
  { name: '6 постов для инсты',                   start: '2026-05-19', end: '2026-05-23', who: 'Ильмира' },
];

function dateStr(d) { return d.toISOString().slice(0,10); }

function isToday(d) { return dateStr(d) === dateStr(TODAY); }

// Build header
const header = document.getElementById('timelineHeader');
DAYS.forEach(d => {
  const col = document.createElement('div');
  col.className = 'day-col' + (isToday(d) ? ' today-col' : '');
  col.innerHTML = `<span class="day-num">${d.getDate()}</span><span>${DAYS_RU[d.getDay()]}</span>`;
  header.appendChild(col);
});

// Build rows
const body = document.getElementById('ganttBody');
tasks.forEach(t => {
  const ws = WHO_STYLES[t.who] || WHO_STYLES[''];
  const startD = new Date(t.start);
  const endD   = new Date(t.end);

  const row = document.createElement('div');
  row.className = 'task-row';

  // Label
  const label = document.createElement('div');
  label.className = 'task-label';
  label.textContent = t.name;
  row.appendChild(label);

  // Who
  const whoCell = document.createElement('div');
  whoCell.className = 'task-who';
  const badge = document.createElement('span');
  badge.className = 'who-badge';
  badge.style.background = ws.light;
  badge.style.color = ws.bg;
  badge.textContent = t.who || '—';
  whoCell.appendChild(badge);
  row.appendChild(whoCell);

  // Timeline
  const tl = document.createElement('div');
  tl.className = 'timeline-row';

  DAYS.forEach((d, i) => {
    const slot = document.createElement('div');
    slot.className = 'day-slot' + (isToday(d) ? ' today-slot' : '');

    const dStr = dateStr(d);
    const inRange = dStr >= t.start && dStr <= t.end;
    const isStart = dStr === t.start;
    const isEnd   = dStr === t.end;

    if (inRange) {
      const bc = document.createElement('div');
      bc.className = 'bar-container';
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.background = ws.bg;
      if (isStart) { bar.style.borderTopLeftRadius = '5px'; bar.style.borderBottomLeftRadius = '5px'; bar.style.marginLeft = '4px'; }
      if (isEnd)   { bar.style.borderTopRightRadius = '5px'; bar.style.borderBottomRightRadius = '5px'; bar.style.marginRight = '4px'; }
      if (!isStart) { bar.style.borderTopLeftRadius = '0'; bar.style.borderBottomLeftRadius = '0'; bar.style.marginLeft = '0'; }
      if (!isEnd)   { bar.style.borderTopRightRadius = '0'; bar.style.borderBottomRightRadius = '0'; bar.style.marginRight = '0'; }
      bc.appendChild(bar);
      slot.appendChild(bc);

      if (isEnd) {
        const dot = document.createElement('div');
        dot.className = 'deadline-dot';
        dot.title = `Дедлайн: ${d.getDate()} ${MONTHS[d.getMonth()]}`;
        slot.appendChild(dot);
      }
    }

    if (isToday(d)) {
      const line = document.createElement('div');
      line.className = 'today-line';
      slot.appendChild(line);
    }

    tl.appendChild(slot);
  });

  row.appendChild(tl);
  body.appendChild(row);
});

// Summary
const byWho = {};
tasks.forEach(t => {
  const w = t.who || 'Не назначено';
  byWho[w] = (byWho[w] || 0) + 1;
});
const summary = document.getElementById('summaryRow');
const total = document.createElement('div');
total.className = 'stat';
total.innerHTML = `<span class="stat-num">${tasks.length}</span><span class="stat-label">Всего задач</span>`;
summary.appendChild(total);
Object.entries(byWho).forEach(([name, cnt]) => {
  const s = document.createElement('div');
  s.className = 'stat';
  s.innerHTML = `<span class="stat-num">${cnt}</span><span class="stat-label">${name}</span>`;
  summary.appendChild(s);
});
</script>
</body>
</html>
